name: agro_market
description: Agro Market - Farm Products Cart and Orders App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  intl: ^0.19.0
  cupertino_icons: ^1.0.2
  supabase_flutter: ^1.5.0
  flutter_dotenv: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true

  web:
    generate: true

  windows:
    generate: true

  macos:
    generate: true

  image_path: "assets/images/logo.png"